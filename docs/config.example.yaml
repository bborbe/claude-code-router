# claude-code-router example config
# Copy to ~/.claude-code-router/config.yaml and chmod 600
# Full reference: docs/config.md

router:
  default_provider: anthropic-subscription

# Per-request trace logging for /v1/* traffic.
# When true, writes one JSON file per request to ~/.claude-code-router/trace/
# (Authorization + x-api-key headers redacted to ***; bodies verbatim).
# Default false — omit or set false for no trace files.
trace: false

providers:

  anthropic-subscription:
    upstream: https://api.anthropic.com
    # no token: → router forwards client's Authorization header
    #   (Claude Code's subscription OAuth bearer passes through untouched)
    models:
      - "claude-opus-*"
      - "claude-sonnet-*"
      - "claude-haiku-*"
      - "opus"
      - "sonnet"
      - "haiku"

  minimax:
    upstream: https://api.minimax.io/anthropic
    token: "<YOUR_MINIMAX_API_KEY>"
    models:
      - "MiniMax-*"

  ollama-local:
    upstream: http://localhost:11434
    token: "ollama"
    models:
      - "qwen*"

# Short names that map to full model identifiers.
# Operator-facing only — the upstream always sees the resolved full name.
# Single-hop, case-sensitive. Add new entries here without code changes.
aliases:
  qwen: qwen3.6:35b-a3b-coding-nvfp4
  minimax: MiniMax-M3-highspeed
  opus: claude-opus-4-7
